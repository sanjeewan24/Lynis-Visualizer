<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LYNIS // CYBER DASHBOARD</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>

<!-- Detail Modal -->
<div id="modal-overlay">
  <div class="modal-box">
    <div class="modal-title">▒ EVENT DETAIL</div>
    <div id="modal-type" class="modal-type"></div>
    <div id="modal-text" class="modal-text"></div>
    <div id="modal-fix"  class="modal-fix"></div>
    <button onclick="closeModal()" class="modal-close">✕ CLOSE</button>
  </div>
</div>

<!-- Vertex tooltip -->
<div id="vtx-tooltip"></div>

<div id="app">

  <!-- Header -->
  <header id="header">
    <div class="header-left">
      <span class="header-logo">▓▓</span>
      LYNIS :: CYBER-HARDENED DASHBOARD
      <span class="blink">█</span>
    </div>
    <div class="header-badges">
      <span id="badge-warn"  class="badge badge-warn">WARN: 0</span>
      <span id="badge-sugg"  class="badge">SUGG: 0</span>
      <span id="badge-unsafe" class="badge badge-orange">UNSAFE: 0</span>
      <span id="badge-tests" class="badge">TESTS: —</span>
    </div>
  </header>

  <!-- Canvas -->
  <div id="canvas-wrap">
    <div id="crater-count">CRATERS: 0</div>

    <!-- Sphere toggles -->
    <div id="sphere-toggles">
      <div class="toggle-label">SPHERE LAYERS</div>
      <label class="toggle-row"><input type="checkbox" id="tog-warning"      checked onchange="saveToggles()"> <span class="dot dot-red"></span> WARNINGS</label>
      <label class="toggle-row"><input type="checkbox" id="tog-suggestion"   checked onchange="saveToggles()"> <span class="dot dot-amber"></span> SUGGESTIONS</label>
      <label class="toggle-row"><input type="checkbox" id="tog-unsafe"       checked onchange="saveToggles()"> <span class="dot dot-orange"></span> UNSAFE SVC</label>
      <label class="toggle-row"><input type="checkbox" id="tog-exposed"      checked onchange="saveToggles()"> <span class="dot dot-yellow"></span> EXPOSED SVC</label>
      <label class="toggle-row"><input type="checkbox" id="tog-disabled"     checked onchange="saveToggles()"> <span class="dot dot-gray"></span> DISABLED</label>
      <label class="toggle-row"><input type="checkbox" id="tog-ok"           checked onchange="saveToggles()"> <span class="dot dot-white"></span> OK / DONE</label>
    </div>

    <div id="harden-idx">
      <span class="hi-label">HARDENING INDEX</span>
      <span id="hi-val">—</span>
    </div>

    <!-- System info bar -->
    <div id="sysinfo-bar">
      <span id="si-host">HOST: —</span>
      <span id="si-os">OS: —</span>
      <span id="si-kernel">KERNEL: —</span>
    </div>
  </div>

  <!-- Side Panel -->
  <aside id="panel">
    <div id="panel-header">▒ LIVE FEED</div>
    <div class="px-divider"></div>

    <!-- Feed filter tabs -->
    <div id="filter-tabs">
      <button class="ftab active" data-filter="all"      onclick="setFilter('all',this)">ALL</button>
      <button class="ftab" data-filter="warning"         onclick="setFilter('warning',this)">WARN</button>
      <button class="ftab" data-filter="suggestion"      onclick="setFilter('suggestion',this)">SUGG</button>
      <button class="ftab" data-filter="unsafe_service"  onclick="setFilter('unsafe_service',this)">UNSAFE</button>
      <button class="ftab" data-filter="status_ok"       onclick="setFilter('status_ok',this)">OK</button>
    </div>

    <!-- Utilities -->
    <div id="feed-utils">
      <button onclick="clearFeed()" class="util-btn util-clear">✕ CLEAR</button>
      <button onclick="exportCSV()" class="util-btn util-export">↓ EXPORT</button>
    </div>

    <!-- Control center -->
    <div id="control-center">
      <div class="cc-label">▒ CONTROL CENTER</div>
      <button id="btn-audit" onclick="runAudit()" class="audit-btn">▶ RUN SYSTEM AUDIT</button>
      <div id="audit-bar-wrap">
        <div id="audit-bar"></div>
      </div>
      <div id="audit-label">IDLE</div>
      <div id="audit-section"></div>
    </div>

    <div class="px-divider"></div>
    <div id="feed"></div>
    <div class="px-divider"></div>

    <!-- Stats -->
    <div id="stats-bar">
      <div class="stat-row"><span>WARNINGS</span>    <span class="stat-val"><span id="stat-warn">0</span><span id="delta-warn" class="delta"></span></span></div>
      <div class="stat-row"><span>SUGGESTIONS</span> <span class="stat-val"><span id="stat-sugg">0</span><span id="delta-sugg" class="delta"></span></span></div>
      <div class="stat-row"><span>UNSAFE SVC</span>  <span class="stat-val"><span id="stat-unsafe">0</span></span></div>
      <div class="stat-row"><span>EXPOSED SVC</span> <span class="stat-val"><span id="stat-exposed">0</span></span></div>
      <div class="stat-row"><span>DISABLED</span>    <span class="stat-val"><span id="stat-disabled">0</span></span></div>
      <div class="stat-row"><span>TESTS RUN</span>   <span class="stat-val"><span id="stat-tests">0</span></span></div>
      <div class="stat-row"><span>STATUS</span>       <span class="stat-val" id="stat-status">WAITING</span></div>
    </div>
  </aside>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
<script>
(function () {
  "use strict";

  // ── Counters ──
  let warnCount=0, suggCount=0, unsafeCount=0, exposedCount=0, disabledCount=0, testsCount=0;

  // ── Feed filter state ──
  let activeFilter = "all";
  const allItems   = []; // {el, type}

  // ── DOM refs ──
  const feed        = document.getElementById("feed");
  const badgeWarn   = document.getElementById("badge-warn");
  const badgeSugg   = document.getElementById("badge-sugg");
  const badgeUnsafe = document.getElementById("badge-unsafe");
  const badgeTests  = document.getElementById("badge-tests");

  // ── Lynis fix hints ──
  const FIXES = {
    "AUTH": "Harden PAM: enforce complexity, lockout policy, and expiry in /etc/login.defs",
    "FIRE": "Configure ufw/iptables. Review unused rules with: iptables -L -n -v",
    "SSH":  "Edit /etc/ssh/sshd_config: disable root login, set MaxAuthTries 3",
    "KRNL": "Apply sysctl hardening. Check /etc/sysctl.conf vs Lynis recommendations",
    "PKGS": "Run: sudo apt update && sudo apt upgrade && sudo apt autoremove",
    "NETW": "Disable unused kernel network modules via /etc/modprobe.d/",
    "LOGG": "Configure rsyslog remote logging. Check deleted-but-open files: lsof +L1",
    "BANN": "Add legal warning text to /etc/issue and /etc/issue.net",
    "ACCT": "Install: sudo apt install acct auditd sysstat",
    "FINT": "Install: sudo apt install aide tripwire rkhunter",
    "FILE": "Run: chmod 600 on world-writable sensitive files",
    "HRDN": "Restrict compiler access: chmod o-rx /usr/bin/gcc /usr/bin/cc",
    "USB":  "Add blacklist usb-storage to /etc/modprobe.d/blacklist.conf",
    "PRNT": "chmod 640 /etc/cups/cupsd.conf",
    "BOOT": "Set GRUB password: grub-mkpasswd-pbkdf2 then edit /etc/grub.d/40_custom",
  };

  function getFix(text) {
    const t = (text || "").toUpperCase();
    for (const [key, fix] of Object.entries(FIXES)) {
      if (t.includes(key)) return fix;
    }
    return "Review the Lynis documentation: https://cisofy.com/lynis/controls/";
  }

  // ── Modal ──
  window.closeModal = function () {
    document.getElementById("modal-overlay").style.display = "none";
  };
  function openModal(type, text) {
    document.getElementById("modal-type").textContent = `[${type.toUpperCase()}]`;
    document.getElementById("modal-text").textContent = text;
    document.getElementById("modal-fix").textContent  = "▸ " + getFix(text);
    document.getElementById("modal-overlay").style.display = "flex";
  }

  // ── Filter ──
  window.setFilter = function (filter, btn) {
    activeFilter = filter;
    document.querySelectorAll(".ftab").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    allItems.forEach(({el, type}) => {
      el.style.display = (filter === "all" || type === filter) ? "block" : "none";
    });
  };

  // ── Feed item ──
  const TYPE_CSS = {
    warning:        "fi-warning",
    suggestion:     "fi-suggestion",
    vulnerability:  "fi-vuln",
    unsafe_service: "fi-unsafe",
    exposed_service:"fi-exposed",
    status_disabled:"fi-disabled",
    status_missing: "fi-disabled",
    status_medium:  "fi-medium",
    status_ok:      "fi-ok",
    status_check:   "fi-ok",
    status_info:    "fi-info",
    info:           "fi-info",
    status:         "fi-status",
  };

  const TYPE_PREFIX = {
    warning:        "[WARN]   ",
    suggestion:     "[SUGG]   ",
    vulnerability:  "[VULN]   ",
    unsafe_service: "[UNSAFE] ",
    exposed_service:"[EXPOSE] ",
    status_disabled:"[OFF]    ",
    status_missing: "[MISS]   ",
    status_medium:  "[MED]    ",
    status_ok:      "[OK]     ",
    status_check:   "[CHECK]  ",
    status_info:    "[INFO]   ",
    info:           "[INFO]   ",
    status:         "[SYS]    ",
  };

  function addFeedItem(text, type) {
    const el  = document.createElement("div");
    const css = TYPE_CSS[type] || "fi-info";
    el.className = `feed-item ${css}`;
    el.textContent = (TYPE_PREFIX[type] || "[???]    ") + text;

    if (["warning","suggestion","vulnerability","unsafe_service","exposed_service"].includes(type)) {
      el.style.cursor = "pointer";
      el.title = "Click for detail & fix";
      el.addEventListener("click", () => openModal(type, text));
    }

    if (activeFilter !== "all" && type !== activeFilter) el.style.display = "none";
    allItems.push({el, type});
    if (allItems.length > 500) {
      const old = allItems.shift();
      if (old.el.parentNode) old.el.parentNode.removeChild(old.el);
    }
    feed.appendChild(el);
    feed.scrollTop = feed.scrollHeight;
  }

  // ── Delta ──
  function setDelta(id, delta) {
    const el = document.getElementById(id);
    if (!el || delta == null) return;
    el.textContent = delta > 0 ? ` (+${delta})` : delta < 0 ? ` (${delta})` : "";
    el.style.color  = delta > 0 ? "#ff2a2a" : delta < 0 ? "#44ff88" : "#888";
  }

  // ── processEvent ──
  function processEvent(evt) {
    const t = evt.type;

    if (t === "warning") {
      warnCount++;
      badgeWarn.textContent = `WARN: ${warnCount}`;
      document.getElementById("stat-warn").textContent = warnCount;
      addFeedItem(evt.text, "warning");
      window.sphereMark && window.sphereMark("warning", evt.text);
    } else if (t === "suggestion") {
      suggCount++;
      badgeSugg.textContent = `SUGG: ${suggCount}`;
      document.getElementById("stat-sugg").textContent = suggCount;
      addFeedItem(evt.text, "suggestion");
      window.sphereMark && window.sphereMark("suggestion", evt.text);
    } else if (t === "vulnerability") {
      addFeedItem(evt.text, "vulnerability");
      window.sphereMark && window.sphereMark("vulnerability", evt.text);
    } else if (t === "unsafe_service") {
      unsafeCount++;
      badgeUnsafe.textContent = `UNSAFE: ${unsafeCount}`;
      document.getElementById("stat-unsafe").textContent = unsafeCount;
      addFeedItem(evt.text, "unsafe_service");
      window.sphereMark && window.sphereMark("unsafe_service", evt.text);
    } else if (t === "exposed_service") {
      exposedCount++;
      document.getElementById("stat-exposed").textContent = exposedCount;
      addFeedItem(evt.text, "exposed_service");
      window.sphereMark && window.sphereMark("exposed_service", evt.text);
    } else if (t === "status_disabled" || t === "status_missing") {
      disabledCount++;
      document.getElementById("stat-disabled").textContent = disabledCount;
      addFeedItem(evt.text, t);
      window.sphereMark && window.sphereMark("disabled", evt.text);
    } else if (t === "status_medium") {
      addFeedItem(evt.text, "status_medium");
    } else if (t === "status_ok" || t === "status_check") {
      addFeedItem(evt.text, "status_ok");
      window.sphereMark && window.sphereMark("ok", evt.text);
    } else if (t === "info" || t === "info_event") {
      addFeedItem(evt.text, "info");
    } else if (t === "hardening_index") {
      document.getElementById("hi-val").textContent = evt.value;
    } else if (t === "tests_performed") {
      testsCount = evt.value;
      document.getElementById("stat-tests").textContent  = testsCount;
      badgeTests.textContent = `TESTS: ${testsCount}`;
    }
  }

  // ── Socket ──
  const socket = io();

  socket.on("connect", () => {
    document.getElementById("stat-status").textContent = "LINKED";
    addFeedItem("WebSocket link established.", "status");
    socket.emit("sync");
  });

  socket.on("disconnect", () => {
    document.getElementById("stat-status").textContent = "OFFLINE";
  });

  socket.on("status", (d) => { addFeedItem(d.msg, "status"); });
  socket.on("error",  (d) => { addFeedItem("ERROR: " + d.msg, "status"); });

  socket.on("system_info", (d) => {
    if (d.key === "hostname")   document.getElementById("si-host").textContent   = "HOST: " + d.value;
    if (d.key === "os")         document.getElementById("si-os").textContent     = "OS: "   + d.value;
    if (d.key === "os_version") document.getElementById("si-os").textContent     += " " + d.value;
    if (d.key === "kernel")     document.getElementById("si-kernel").textContent = "KERNEL: " + d.value;
  });

  socket.on("audit_section", (d) => {
    document.getElementById("audit-section").textContent = "▸ " + d.section;
  });

  socket.on("audit_progress", (d) => { addFeedItem(d.line, "status"); });

  socket.on("session_reset", () => {
    warnCount=0; suggCount=0; unsafeCount=0; exposedCount=0; disabledCount=0; testsCount=0;
    allItems.length = 0;
    badgeWarn.textContent   = "WARN: 0";
    badgeSugg.textContent   = "SUGG: 0";
    badgeUnsafe.textContent = "UNSAFE: 0";
    badgeTests.textContent  = "TESTS: —";
    ["stat-warn","stat-sugg","stat-unsafe","stat-exposed","stat-disabled","stat-tests"]
      .forEach(id => document.getElementById(id).textContent = "0");
    document.getElementById("hi-val").textContent = "—";
    document.getElementById("delta-warn").textContent = "";
    document.getElementById("delta-sugg").textContent = "";
    feed.innerHTML = "";
    addFeedItem("SESSION RESET — NEW AUDIT STARTING", "status");
    window.sphereReset && window.sphereReset();
  });

  socket.on("warning",        (d) => { processEvent({type:"warning",        ...d}); setDelta("delta-warn", d.delta); });
  socket.on("suggestion",     (d) => { processEvent({type:"suggestion",     ...d}); setDelta("delta-sugg", d.delta); });
  socket.on("vulnerability",  (d) =>   processEvent({type:"vulnerability",  ...d}));
  socket.on("unsafe_service", (d) =>   processEvent({type:"unsafe_service", ...d}));
  socket.on("exposed_service",(d) =>   processEvent({type:"exposed_service",...d}));
  socket.on("status_disabled",(d) =>   processEvent({type:"status_disabled",...d}));
  socket.on("status_medium",  (d) =>   processEvent({type:"status_medium",  ...d}));
  socket.on("status_check",   (d) =>   processEvent({type: d.category || "status_ok", text: d.text}));
  socket.on("info_event",     (d) =>   processEvent({type:"info",           ...d}));
  socket.on("hardening_index",(d) =>   processEvent({type:"hardening_index",...d}));
  socket.on("tests_performed",(d) =>   processEvent({type:"tests_performed",...d}));

  socket.on("sync_dump", (d) => {
    if (!d.events || !d.events.length) return;
    addFeedItem(`[SYNC] RESTORING ${d.events.length} EVENTS`, "status");
    d.events.forEach(processEvent);
  });

  // ── Audit control ──
  let auditTimer = null;
  let auditPct   = 0;

  window.runAudit = function () {
    const btn = document.getElementById("btn-audit");
    btn.disabled = true;
    btn.textContent = "⏳ RUNNING...";
    auditPct = 0;
    document.getElementById("audit-bar").style.width = "0%";
    document.getElementById("audit-label").textContent = "STARTING...";
    socket.emit("start_audit");
    auditTimer = setInterval(() => {
      if (auditPct < 88) { auditPct += Math.random() * 1.5; }
      document.getElementById("audit-bar").style.width = Math.min(auditPct, 88) + "%";
    }, 900);
  };

  socket.on("audit_status", (d) => {
    clearInterval(auditTimer);
    const bar   = document.getElementById("audit-bar");
    const label = document.getElementById("audit-label");
    const btn   = document.getElementById("btn-audit");

    if (d.state === "finished" || d.state === "done") {
      bar.style.width = "100%";
      label.textContent = "COMPLETE";
      label.style.color = "#e8e8e8";
    } else if (d.state === "error") {
      bar.style.width = "100%";
      bar.style.background = "#ff2a2a";
      label.textContent = "ERROR";
      label.style.color = "#ff2a2a";
    } else if (d.state === "busy") {
      label.textContent = "BUSY";
    } else if (d.state === "running") {
      label.textContent = d.msg;
      return;
    }
    addFeedItem(d.msg, "status");
    if (d.state !== "running") {
      btn.disabled = false;
      btn.textContent = "▶ RUN SYSTEM AUDIT";
    }
  });

  // ── Feed utilities ──
  window.clearFeed = function () {
    feed.innerHTML = "";
    allItems.length = 0;
    addFeedItem("FEED CLEARED", "status");
  };
  window.exportCSV = function () { window.location.href = "/api/export"; };

  // ── Sphere toggle persistence ──
  window.saveToggles = function () {
    const state = {};
    document.querySelectorAll("#sphere-toggles input[type=checkbox]").forEach(cb => {
      state[cb.id] = cb.checked;
    });
    try { localStorage.setItem("lynis_toggles", JSON.stringify(state)); } catch(e){}
    window.applyToggles && window.applyToggles();
  };

  function loadToggles() {
    try {
      const saved = JSON.parse(localStorage.getItem("lynis_toggles") || "{}");
      Object.entries(saved).forEach(([id, val]) => {
        const el = document.getElementById(id);
        if (el) el.checked = val;
      });
    } catch(e){}
  }
  loadToggles();

})();
</script>

<!-- Three.js + OrbitControls + Visualizer -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="/visualizer.js"></script>

</body>
</html>
